# Host-level Nginx config (Copy this to /etc/nginx/sites-available/cryptantus.com)

server {
    listen 80;
    server_name cryptantus.com www.cryptantus.com;

    # Redirect HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name cryptantus.com www.cryptantus.com;

    # Let's Encrypt SSL
    ssl_certificate /etc/letsencrypt/live/cryptantus.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cryptantus.com/privkey.pem;

    # Recommended security settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

    # Proxy /app/ to Docker container
    location /app/ {
        proxy_pass http://127.0.0.1:8080/app/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (optional, for HMR or similar)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Redirect root to /app/
    location = / {
        return 301 /app/;
    }

    # Proxy /api/ to Backend
    location /api/ {
        proxy_pass http://80.89.238.37:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
